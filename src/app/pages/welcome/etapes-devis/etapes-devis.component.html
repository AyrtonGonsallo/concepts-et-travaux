<div>
  
    <h2>Liste des N.B.</h2>    
    <button nz-button nzType="primary" class="positive-action mb-5 mt-5" [routerLink]="['/administration', 'nota-bene', 'ajouter-nota-bene']">Ajouter un nota bene</button>


    <div>
      <fieldset>
        <legend>Filtres</legend>
            
        <div class="filter-container">
          <div class="filter-box">
            Travail
            <nz-select [(ngModel)]="filteredNBTravailID" (ngModelChange)="doubleSearch()"  class="filter-select">
              <nz-option  nzLabel="Tous les travaux" [nzValue]="0"></nz-option>
              <nz-option *ngFor="let option of travaux" [nzLabel]="option.Titre" [nzValue]="option.ID"></nz-option>
            </nz-select>
          </div>
          <div class="filter-box">
            Étape
            <nz-select [(ngModel)]="filteredNBEtape" (ngModelChange)="doubleSearch()" class="filter-select">
              <nz-option  nzLabel="Toutes les étapes" nzValue=""></nz-option>
                <nz-option *ngFor="let element of filteredNBListEtapes"  [nzValue]="element" [nzLabel]="element"></nz-option>
            </nz-select>
          </div>
          
        </div>
      </fieldset>
    </div>


    <nz-table #sortTable [nzData]="listOfDisplayData"  nzTableLayout="fixed" [nzScroll]="{ x: '240px' }">
        <thead>
          <tr>
            <th *ngFor="let column of listOfColumn" [nzSortOrder]="column.order" [nzSortFn]="column.compare" [nzSortPriority]="column.priority">
              {{ column.title }}
            </th>
            <th>
              Actions
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of sortTable.data" >
            <td>{{ data.ID }}</td>
            <td>{{ data.Titre }}</td>
            <td>{{ data.Travail?.Titre }}</td>
            <td>{{ data.Etape }}</td>
            
           
            <td> 
              <button nz-button nzType="primary" class="positive-action mb-5"  [nzSize]="size" title="modifier" [routerLink]="['/administration', 'nota-bene', 'modifier-nota-bene',data.ID]"><span nz-icon nzType="edit"></span></button>
              <button nz-button nzType="primary" class="negative-action mb-5" [nzSize]="size" title="supprimer"  nz-popconfirm
              nzPopconfirmTitle="Are you sure delete this account?"
              nzPopconfirmPlacement="bottom"
              (nzOnConfirm)="deleteEtape(data.ID)"
              (nzOnCancel)="cancel()" ><span nz-icon nzType="delete"></span></button>
            </td>
          </tr>
        </tbody>
    </nz-table>
</div>
